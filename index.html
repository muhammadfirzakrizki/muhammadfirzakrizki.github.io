<!DOCTYPE html>
<html lang="id" data-theme="nord">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firzak | Mobile Dev Portfolio</title>

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Alpine -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>

<body class="bg-base-200 min-h-screen p-6 md:p-12"
    x-data="{
        dark: false,
        toggleTheme() {
            this.dark = !this.dark;
            document.documentElement.setAttribute('data-theme', this.dark ? 'dark' : 'nord');
        },
        profile: {
            name: 'M. Firzak Rizki',
            role: 'Flutter Developer',
            location: 'Bogor, ID',
            bio: 'Fokus membangun pengalaman mobile yang mulus dengan <b>Dart & Flutter</b>.',
            skills: ['FLUTTER','DART','GIT','LINUX'],
            github: 'https://github.com/muhammadfirzakrizki'
        },
        projects: [
            {
                title: 'ICT IPB Flutter Demo',
                desc: 'Implementasi mobile kampus.',
                tech: 'FLUTTER',
                link: '#',
                color: 'primary',
                icon: 'fa-mobile-screen'
            },
            {
                title: 'FocusFlow',
                desc: 'Aplikasi produktivitas.',
                tech: 'FLUTTER',
                link: '#',
                color: 'secondary',
                icon: 'fa-clock'
            }
        ]
    }"
    x-init="AOS.init({ once: true, duration: 800 })">

    <div class="max-w-7xl mx-auto">

        <!-- TOGGLE -->
        <div class="flex justify-end mb-6">
            <button @click="toggleTheme()" class="btn btn-sm rounded-xl flex gap-2">
                <i class="fa-solid" :class="dark ? 'fa-sun' : 'fa-moon'"></i>
                <span x-text="dark ? 'Light' : 'Dark'"></span>
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

            <!-- PROFILE -->
            <div class="lg:col-span-4" data-aos="fade-right">
                <div class="card bg-base-100 shadow-xl rounded-[2rem] p-6">
                    <h1 class="text-2xl font-bold" x-text="profile.name"></h1>
                    <p class="text-sm opacity-70" x-text="profile.role"></p>

                    <div class="mt-4 flex flex-wrap gap-2">
                        <template x-for="skill in profile.skills">
                            <span class="badge flex gap-2">
                                <i class="fa-solid fa-code"></i>
                                <span x-text="skill"></span>
                            </span>
                        </template>
                    </div>

                    <div class="mt-4 flex flex-col gap-2">
                        <a :href="profile.github" target="_blank" class="btn btn-primary flex gap-2">
                            <i class="fa-brands fa-github"></i> GitHub
                        </a>
                        <a href="https://www.linkedin.com/in/muhammadfirzakrizki/" target="_blank" class="btn btn-outline flex gap-2">
                            <i class="fa-brands fa-linkedin"></i> LinkedIn
                        </a>
                    </div>
                </div>
            </div>

            <!-- PROJECTS -->
            <div class="lg:col-span-8 space-y-6">
                <h2 class="text-3xl font-bold" data-aos="fade-up">Projects</h2>

                <div class="grid md:grid-cols-2 gap-6">
                    <template x-for="project in projects">
                        <div class="card bg-base-100 shadow hover:shadow-xl transition-all"
                             data-aos="zoom-in">
                            <div class="card-body">
                                <i class="fa-solid text-2xl" :class="project.icon"></i>
                                <h3 class="font-bold text-lg" x-text="project.title"></h3>
                                <p class="text-sm opacity-60" x-text="project.desc"></p>
                                <a :href="project.link" class="text-primary text-sm mt-2">View →</a>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
